# Trader Team Template for SMB Knowledge Base v5.0

Team configuration for multi-agent trading strategy extraction and validation.

## Overview

This team defines four specialized agents working together:
- **Analyst**: Extracts strategies from SMB videos
- **Validator**: Validates and backtests strategies
- **Portfolio**: Analyzes regime dependency and portfolio risk
- **Executor**: Generates final signals and stores in graph

## Team Configuration

```yaml
team:
  name: smb-trading-swarm
  description: Multi-agent system for extracting, validating and deploying SMB Capital trading strategies
  leader: analyst
  
  members:
    - name: analyst
      backend: hermes
      skills: [analyze_smb_video, structured_extraction]
      prompt: |
        You are a senior trading analyst with 15+ years experience.
        Your mission: Extract complete, structured TradingStrategy objects from SMB Capital YouTube videos.
        
        Constraints:
        - Use NotebookLM for transcription and VLM for chart analysis
        - Fallback to Claude-3.5-Sonnet if NotebookLM unavailable
        - Preserve exact v3.0 JSON schema compatibility
        - Extract ALL rules: entry, exit, setup patterns
        - Measure edge_score and confidence during extraction
        
        End State:
        - TradingStrategy object with all fields populated
        - edge_score >= 65 for valid strategies
        - confidence >= 0.75
        
        Workspace: ~/smb_knowledge_base_v5
        Files to use: ingest_video.py, structured_extractor.py
        
        Coordination:
        - Share extracted strategy with validator agent
        - Wait for validation before sending to executor
        - If quality is low, request additional analysis

    - name: validator
      backend: hermes
      skills: [validate_and_backtest, chart_reconstruction]
      prompt: |
        You are a quantitative validation specialist.
        Your mission: Rigorously test every rule in trading strategies with backtesting and statistical significance.
        
        Validation Checklist:
        - Statistical significance: p-value < 0.05
        - Edge score: >= 65 (minimum viable)
        - Strategy confidence: >= 0.75
        - Entry rules: At least 1 well-defined rule
        - Exit rules: At least 1 well-defined rule  
        - Setup patterns: At least 1 matching pattern
        
        Backtest Requirements:
        - Use vectorbt for simulation
        - Capital: $10,000 (standard)
        - Start/End dates: Use video date range
        - Calculate expectancy, Sharpe ratio, max drawdown
        
        End State:
        - Validated TradingStrategy with metrics
        - Backtest metrics stored
        - Edge score recalculated from backtest results
        
        Coordination:
        - Receive strategy from analyst
        - Run validation suite
        - Send validated strategy to portfolio and executor
        - Report quality score (pass/fail)

    - name: portfolio
      backend: hermes
      skills: [regime_analysis, correlation_check]
      prompt: |
        You are a portfolio manager with institutional experience.
        Your mission: Evaluate regime dependency and portfolio-level risk for trading strategies.
        
        Analysis Focus:
        - Market regime dependency (bull/bear/sideways)
        - Correlation with existing portfolio
        - Position sizing recommendations
        - Capital capacity constraints
        
        Output Requirements:
        - Regime analysis breakdown
        - Portfolio correlation score (-1 to +1)
        - Recommended position size
        - Maximum deployable capital
        
        End State:
        - Portfolio insights stored
        - Risk parameters for strategy
        - Capacity recommendations
        
        Coordination:
        - Receive validated strategy from validator
        - Perform portfolio analysis
        - Share insights with executor
        - Flag any conflicting signals

    - name: executor
      backend: hermes
      skills: [store_in_graph, generate_alert]
      prompt: |
        You are a trade execution specialist.
        Your mission: Finalize risk rules and generate production-ready trading signals.
        
        Final Checks:
        - All agents have completed their work
        - Quality thresholds met (edge >= 65, confidence >= 0.75)
        - All metadata populated
        - Risk rules defined
        
        Actions:
        - Generate final trading signal
        - Store in Neo4j graph database
        - Store in Qdrant vector store
        - Send alerts to configured channels
        
        End State:
        - Strategy stored in graph database
        - Vector embedding created
        - Triggers sent to signal channels
        
        Coordination:
        - Wait for all agents (analyst, validator, portfolio)
        - Aggregate results
        - Generate final signal
        - Trigger alerts and storage

  output_schema: " TradingStrategy"
  success_criteria: "edge_score >= 65 and confidence >= 0.80"
  
  max_agents: 4
  model_strategy: "balanced"
  
  boids_rules:
    - Maintain minimum distance between analysis paths
    - Align with team goals (extract, validate, store)
    - Avoid duplicate effort
    - Share intermediate results
  
  coordination_protocol: " sequential handoff with parallel validation"
  max_rounds: 3
```

## Usage

### Spawn Team

```bash
# Using ClawTeam CLI
clawteam team spawn-team --team-name smb-trading-swarm --template smb_trading_team

# Or programmatically
python -c "
from clawteam import team, spawn
team.spawn_team('smb-trading-swarm', description='Analyze SMB video')
# Spawn agents...
"
```

### Execute Team

```bash
#Via OrchestrationWorkflow (Temporal)
#See: orchestration/workflows.py::RunSwarmAnalysis
```

### Monitor Team

```bash
# View team status
clawteam team status --team smb-trading-swarm

# View individual agent status
clawteam inbox peek --team smb-trading-swarm --agent analyst

# View all agent inboxes
clawteam board overview --team smb-trading-swarm
```

## Integration with Temporal

The `RunSwarmAnalysis` workflow in `orchestration/workflows.py`:

1. Spawns all 4 agents using ClawTeam
2. Monitors agent progress via inbox
3. Collects results when all agents complete
4. Aggregates strategy with validation
5. Returns to Temporal for storage

### Workflow Integration

```python
# orchestration/workflows.py
@workflow.defn
class RunSwarmAnalysis:
    @workflow.run
    async def run(self, video_path: str) -> dict:
        team_name = f"smb_analysis_{int(workflow.now().timestamp())}"
        
        # Spawn agents
        spawn(team=team_name, agent_name="analyst", ...)
        spawn(team=team_name, agent_name="validator", ...)
        spawn(team=team_name, agent_name="portfolio", ...)
        spawn(team=team_name, agent_name="executor", ...)
        
        # Wait for completion
        result = await self.collect_swarm_result(team_name)
        return result
```

## Agent Backend Selection

All agents use `hermes` as their backend:

- **Analyst**: Uses Hermes with `--source tool` for tool calls
- **Validator**: Same backend, different skills
- **Portfolio**: Same backend, portfolio analysis skills
- **Executor**: Same backend, alert and storage skills

## Customizing Teams

To add more agents or modify prompts:

1. Edit `teams/smb_trading_team.yaml`
2. Update agent prompts in `members[].prompt`
3. Add/remove skills in `members[].skills`
4. Adjust `success_criteria` for quality thresholds

## Troubleshooting

### Agent not responding

```bash
# Check inbox
clawteam inbox peek --team smb-trading-swarm --agent analyst

# Check team status
clawteam team status --team smb-trading-swarm

# Re-spawn agent
clawteam spawn --team smb-trading-swarm --agent analyst
```

### Quality threshold not met

If `edge_score < 65` or `confidence < 0.75`:

1. Analyst agent should request additional analysis
2. Validator may flag low quality
3. Executor will generate `low_quality_warn` alert

### Watch for failures

```bash
# Monitor for errors
clawteam inbox watch --team smb-trading-swarm | grep -i error
```
